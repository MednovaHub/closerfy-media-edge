;; Closerfy Media Edge — PJSIP config
;; Gera SDP DTLS-SRTP que Meta WhatsApp Calling API aceita.
;; Validado em spike 2026-05-06 — Meta retornou 138006 (sem permissão do
;; destinatário) em vez de 138008 (SDP rejeitado), comprovando que o formato
;; do SDP é aceito.

;; ── Transports ─────────────────────────────────────────
[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=REPLACE_WITH_PUBLIC_IP
external_signaling_address=REPLACE_WITH_PUBLIC_IP

;; WS transport compartilha o HTTP server (http.conf bindport=8090).
;; Caddy termina TLS e proxa wss://media.closerfy.ai/ws → ws://127.0.0.1:8090/ws.
;; bind= é obrigatório no PJSIP transport mesmo com WS — porta 5066 é
;; placeholder (o WS real fica no HTTP server da http.conf).
[transport-ws]
type=transport
protocol=ws
bind=0.0.0.0:5066

;; ── Endpoint Meta WhatsApp (outbound calls) ────────────
;; Usado pra gerar SDP via originate. Como Meta não fala SIP, o INVITE
;; nunca chega de fato — só usamos pra extrair o SDP gerado pelo Asterisk.
[whatsapp-out]
type=endpoint
context=from-internal
disallow=all
allow=opus
webrtc=yes
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=actpass
dtls_cert_file=/etc/asterisk/keys/asterisk.crt
dtls_private_key=/etc/asterisk/keys/asterisk.key
ice_support=yes
rtcp_mux=yes
rewrite_contact=no
rtp_symmetric=no
direct_media=no
aors=whatsapp-out-aor

[whatsapp-out-aor]
type=aor
contact=sip:meta@graph.facebook.com:443

;; ── Browser endpoint (Closerfy frontend via SIP.js) ────
;; Anônimo — todos browsers vêm de 127.0.0.1 (Caddy WS proxy).
;; Auth e per-user credentials ficam pra Chunk 3b. Por ora MVP.
[browser]
type=endpoint
context=from-internal
disallow=all
allow=opus
webrtc=yes
media_encryption=dtls
dtls_verify=fingerprint
dtls_setup=actpass
dtls_cert_file=/etc/asterisk/keys/asterisk.crt
dtls_private_key=/etc/asterisk/keys/asterisk.key
ice_support=yes
rtcp_mux=yes
rewrite_contact=no
direct_media=no
allow_subscribe=no
aors=browser-aor

[browser-aor]
type=aor
max_contacts=100
remove_existing=yes

[browser-id]
type=identify
endpoint=browser
match=127.0.0.1
match_request_uri=sip:browser@
