[modules]
autoload=yes

; Drivers de áudio físico que não fazem sentido em container
noload => chan_alsa.so
noload => chan_console.so
noload => chan_oss.so

; Phoneprov não usado
noload => res_phoneprov.so
noload => res_pjsip_phoneprov_provider.so

; CDR/CEL backends que dependem de DBs externos não usados
noload => cdr_pgsql.so
noload => cdr_sqlite3_custom.so
noload => cel_pgsql.so
noload => cel_sqlite3_custom.so

; Format ogg vorbis exige libvorbisenc que não vem na imagem
noload => format_ogg_vorbis.so
