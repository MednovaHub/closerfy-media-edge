# Closerfy Media Edge — Coturn STUN/TURN config

# Listening interface (host network)
listening-port=3478
tls-listening-port=5349

# IPs públicos pra ICE candidates — substituir <PUBLIC_IP> antes de subir
external-ip=<PUBLIC_IP>

# Domínio realm (pode ser qualquer string identificadora)
realm=closerfy.ai
server-name=media.closerfy.ai

# Auth: usa shared secret time-limited (REST API auth)
use-auth-secret
static-auth-secret=REPLACE_WITH_COTURN_SHARED_SECRET

# Logs pra stdout (Docker captura)
log-file=stdout
verbose

# Range de portas relay UDP (abrir na firewall da VPS)
min-port=49152
max-port=65535

# Segurança: rejeita IPs locais como destino (evita loopback abuse)
no-multicast-peers
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=255.255.255.255-255.255.255.255

# TLS cert vem do Caddy (montar volume) — temporário usa self-signed
# cert=/etc/coturn/cert.pem
# pkey=/etc/coturn/key.pem

# Performance
fingerprint
lt-cred-mech
no-cli
